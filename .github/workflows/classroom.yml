name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Term Group Project
      id: term-group-project
      uses: classroom-resources/autograding-python-grader@v1
      with:
        timeout: 25
        max-score: 100
        setup-command: ''
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TERM-GROUP-PROJECT_RESULTS: "${{steps.term-group-project.outputs.result}}"
      with:
        runners: term-group-project
